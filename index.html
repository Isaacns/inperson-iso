<style>
/* ============================================================
   INPERSON · Qualidade ISO — app independente
   Tema AURA: fundo #010510, acento #74B0D8, texto #FAFAFA.
   ============================================================ */
:root{
  --ip-bg:#010510; --ip-surface:#080F1E; --ip-surface-2:#0C1426;
  --ip-border:#15223A; --ip-border-2:#21344E;
  --ip-accent:#74B0D8; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:#FAFAFA; --ip-muted:#8FA3BE; --ip-faint:#52647F;
  --ip-ok:#5FBF8F; --ip-warn:#D9A441; --ip-danger:#D9655B;
  --ip-radius:16px; --ip-radius-sm:10px;
  --ip-font:"Segoe UI", Inter, system-ui, -apple-system, sans-serif;
  --glass-bg:linear-gradient(135deg, rgba(124,176,216,.10), rgba(255,255,255,.02));
  --glass-brd:rgba(150,190,225,.16);
  --glass-blur:blur(20px) saturate(150%);
  --glass-shadow:0 10px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{margin:0;font-family:var(--ip-font);font-weight:400;color:var(--ip-text);background:var(--ip-bg);-webkit-font-smoothing:antialiased;letter-spacing:.2px;overflow-x:hidden}
a{color:var(--ip-accent);text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300;margin:0}
/* fundo vivo */
.ip-bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ip-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.ip-blob.b1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#1f5e8a,transparent 70%);animation:ip-aurora 22s ease-in-out infinite}
.ip-blob.b2{width:40vw;height:40vw;right:-6vw;top:8vh;background:radial-gradient(circle,#0e3a5c,transparent 70%);animation:ip-aurora 28s ease-in-out infinite reverse}
.ip-blob.b3{width:50vw;height:50vw;left:18vw;bottom:-22vw;background:radial-gradient(circle,#14506e,transparent 70%);animation:ip-aurora 34s ease-in-out infinite}
@keyframes ip-aurora{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-4%) scale(1.12)}66%{transform:translate(-4%,5%) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes ip-spin{to{transform:rotate(360deg)}}
@keyframes ip-fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* layout */
.ip-rel{position:relative;z-index:1}
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)} .ip-accent{color:var(--ip-accent)}
.ip-shell{display:flex;min-height:100vh;position:relative;z-index:1}
.ip-side{width:248px;flex:0 0 248px;padding:22px 16px;border-right:1px solid var(--ip-border);display:flex;flex-direction:column;gap:6px;background:rgba(5,10,22,.55);backdrop-filter:blur(14px);position:sticky;top:0;height:100vh}
.ip-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.ip-brand img{width:40px;height:40px;border-radius:10px}
.ip-brand b{font-weight:600;letter-spacing:.5px;font-size:15px}
.ip-nav{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:var(--ip-muted);cursor:pointer;transition:.15s;font-size:14px;border:1px solid transparent}
.ip-nav:hover{background:rgba(116,176,216,.08);color:var(--ip-text)}
.ip-nav.on{background:var(--glass-bg);border-color:var(--glass-brd);color:var(--ip-text);box-shadow:var(--glass-shadow)}
.ip-nav .ic{font-size:17px;width:22px;text-align:center}
.ip-main{flex:1;min-width:0;padding:28px 30px 60px;animation:ip-fadeup .4s ease}
.ip-topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.ip-h1{font-size:26px;font-weight:300}
.ip-sub{color:var(--ip-muted);font-size:13px;margin-top:3px}
/* glass card */
.ip-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);border-radius:var(--ip-radius);box-shadow:var(--glass-shadow)}
.ip-pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.grid.k4{grid-template-columns:repeat(4,1fr)} .grid.k3{grid-template-columns:repeat(3,1fr)} .grid.k2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1000px){.grid.k4{grid-template-columns:repeat(2,1fr)}.grid.k3{grid-template-columns:1fr}.grid.k2{grid-template-columns:1fr}}
/* pills / badges */
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--glass-brd);color:var(--ip-muted);background:rgba(255,255,255,.03)}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.3px}
.bdg.ok{color:#0a2c1d;background:var(--ip-ok)} .bdg.warn{color:#2c2206;background:var(--ip-warn)} .bdg.dang{color:#2c0c09;background:var(--ip-danger)}
.bdg.dim{color:var(--ip-muted);background:rgba(255,255,255,.05);border:1px solid var(--glass-brd)}
/* buttons / inputs */
.ip-btn{position:relative;display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s}
.ip-btn:hover{filter:brightness(1.07);box-shadow:0 6px 16px rgba(116,176,216,.26)}
.ip-btn:active{filter:brightness(.95)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:rgba(255,255,255,.04);border-color:var(--glass-brd);color:var(--ip-text)}
.ip-btn.ghost:hover{background:rgba(116,176,216,.12);border-color:var(--ip-accent)}
.ip-btn.sm{padding:6px 11px;font-size:12px}
.ip-input,.ip-sel,textarea.ip-input{width:100%;padding:11px 13px;border-radius:var(--ip-radius-sm);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:14px;transition:.18s}
.ip-input:focus,.ip-sel:focus,textarea.ip-input:focus{outline:none;border-color:var(--ip-accent)}
.ip-input::placeholder{color:var(--ip-faint)}
.ip-sel option,.ip-input option{color:#10243a;background:#fff}
.ip-lbl{display:block;font-size:12px;color:var(--ip-muted);margin:0 0 6px;letter-spacing:.3px}
.field{margin-bottom:14px}
/* table */
.ip-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ip-tbl th{text-align:left;color:var(--ip-faint);font-weight:500;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:9px 10px;border-bottom:1px solid var(--ip-border)}
.ip-tbl td{padding:11px 10px;border-bottom:1px solid var(--ip-border)}
.ip-tbl tr:hover td{background:rgba(116,176,216,.05)}
.kpi-big{font-size:30px;font-weight:300;line-height:1}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sec-h{font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-faint);margin:22px 0 10px}
/* auth */
.ip-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.ip-authbox{width:100%;max-width:380px;text-align:center}
.ip-authbox img{width:64px;height:64px;border-radius:16px;margin-bottom:14px}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:ip-spin .8s linear infinite}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;padding:12px 20px;border-radius:12px;background:var(--ip-surface-2);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow);font-size:14px;animation:ip-fadeup .3s ease}
.toast.ok{border-color:var(--ip-ok)} .toast.err{border-color:var(--ip-danger)}
/* checklist rows */
.ck-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--ip-border)}
.seg{display:inline-flex;border:1px solid var(--glass-brd);border-radius:9px;overflow:hidden}
.seg button{padding:6px 12px;background:transparent;border:none;color:var(--ip-muted);cursor:pointer;font-size:12px;font-weight:600;border-right:1px solid var(--glass-brd)}
.seg button:last-child{border-right:none}
.seg button.on.ok{background:var(--ip-ok);color:#0a2c1d}
.seg button.on.nc{background:var(--ip-danger);color:#2c0c09}
.seg button.on.na{background:var(--ip-faint);color:#04101c}
/* ============ DOCUMENTO CONTROLADO (impressão/PDF) ============ */
.doc-ctrl{background:#fff;color:#10243a;border-radius:14px;max-width:920px;margin:0 auto;padding:0;box-shadow:0 18px 50px rgba(0,0,0,.5);overflow:hidden}
.doc-ctrl .dc-head{display:flex;align-items:center;gap:16px;padding:22px 30px;border-bottom:3px solid #2C6BE0;background:#f7fafd}
.doc-ctrl .dc-head img{width:46px;height:46px}
.doc-ctrl .dc-head .t{flex:1}
.doc-ctrl .dc-head .t b{font-size:16px;color:#0d2440;letter-spacing:.5px}
.doc-ctrl .dc-head .t span{display:block;font-size:11px;color:#5b6b80;letter-spacing:.4px}
.doc-ctrl .dc-tag{font-size:10px;font-weight:700;color:#2C6BE0;border:1px solid #2C6BE0;border-radius:6px;padding:3px 8px;letter-spacing:.6px;text-transform:uppercase}
.doc-ctrl .dc-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid #dde6f0}
.doc-ctrl .dc-meta div{padding:10px 14px;border-right:1px solid #dde6f0;font-size:11px}
.doc-ctrl .dc-meta div:last-child{border-right:none}
.doc-ctrl .dc-meta b{display:block;color:#90a0b5;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.doc-ctrl .dc-body{padding:24px 30px}
.doc-ctrl h2.dc-title{font-size:19px;color:#0d2440;font-weight:600;margin:0 0 4px}
.doc-ctrl .dc-body table{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
.doc-ctrl .dc-body th{background:#eef3f9;color:#34465c;text-align:left;padding:8px 10px;border:1px solid #dde6f0;font-size:11px}
.doc-ctrl .dc-body td{padding:8px 10px;border:1px solid #dde6f0;color:#1d3349}
.doc-ctrl .dc-sign{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:34px}
.doc-ctrl .dc-sign .s{border-top:1px solid #2c3e55;padding-top:6px;font-size:11px;color:#34465c;text-align:center}
.doc-ctrl .dc-foot{padding:14px 30px;border-top:1px solid #dde6f0;background:#f7fafd;font-size:10px;color:#7a8aa0;text-align:center;letter-spacing:.3px}
.res-ok{color:#1f9d63;font-weight:700} .res-nc{color:#d0392b;font-weight:700} .res-na{color:#7a8aa0;font-weight:700} .res-pa{color:#b9821f;font-weight:700}

.prog{height:9px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden}
.prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ip-accent-2),var(--ip-accent));transition:width .4s ease}
.exec-row{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid var(--ip-border)}
.exec-row:last-child{border-bottom:none}
.exec-row:hover{background:rgba(116,176,216,.04)}
.bdg{border:none;font-family:inherit}
/* ====== Página pública do cliente (André) — timeline animada, mobile-first ====== */
.acp{max-width:560px;margin:0 auto;padding:26px 16px 70px;position:relative;z-index:1}
.acp-head{text-align:center;margin-bottom:20px;animation:ip-fadeup .5s ease}
.acp-logo{display:inline-flex}

.acp-live{display:inline-flex;align-items:center;gap:7px;font-size:9.5px;font-weight:800;letter-spacing:.14em;color:var(--ip-ok);border:1px solid var(--glass-brd);border-radius:99px;padding:5px 12px;margin:14px 0 12px;background:rgba(95,191,143,.08)}
.acp-live .d{width:7px;height:7px;border-radius:50%;background:var(--ip-ok);box-shadow:0 0 8px var(--ip-ok);animation:ip-blink 1.4s ease-in-out infinite}
@keyframes ip-blink{0%,100%{opacity:1}50%{opacity:.2}}
.acp-head h1{font-size:20px;font-weight:300;margin:0;letter-spacing:.2px}
.acp-sub{font-size:12.5px;color:var(--ip-muted);margin-top:5px}
.acp-prog{background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:16px;padding:15px 18px;box-shadow:var(--glass-shadow);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);margin-bottom:24px}
.acp-prog-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--ip-muted)}
.acp-prog-top b{font-size:26px;font-weight:300;color:var(--ip-accent)}
.acp-bar{height:11px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:9px}
.acp-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ip-accent-2),var(--ip-accent));position:relative;overflow:hidden;transition:width .7s cubic-bezier(.4,0,.2,1)}
.acp-bar i .sh{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);transform:translateX(-100%);animation:acp-shimmer 1.9s ease-in-out infinite}
@keyframes acp-shimmer{100%{transform:translateX(220%)}}
.acp-tl{position:relative}
.acp-step{display:grid;grid-template-columns:32px 1fr;gap:13px;animation:ip-fadeup .5s ease both}
.acp-rail{position:relative;display:flex;flex-direction:column;align-items:center}
.acp-node{position:relative;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:800;flex:none;z-index:2;transition:.3s;border:2px solid var(--ip-border-2);background:var(--ip-surface);color:var(--ip-faint)}
.acp-node.done{background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));border-color:var(--ip-accent);color:#03101c}
.acp-node.val{background:linear-gradient(135deg,var(--ip-ok),#3fae7a);border-color:var(--ip-ok);color:#04231a;box-shadow:0 0 0 4px rgba(95,191,143,.18)}
.acp-node.run{border-color:var(--ip-accent);color:var(--ip-accent)}
.acp-node.run::after{content:"";position:absolute;left:-2px;top:-2px;width:30px;height:30px;border-radius:50%;border:2px solid var(--ip-accent);animation:acp-ping 1.5s ease-out infinite}
@keyframes acp-ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(2);opacity:0}}
.acp-line{width:2px;flex:1;min-height:38px;background:var(--ip-border);margin-top:3px;position:relative;overflow:hidden}
.acp-step.done .acp-line,.acp-step.val .acp-line{background:var(--ip-accent)}
.acp-step.run .acp-line::after{content:"";position:absolute;left:0;right:0;height:45%;background:linear-gradient(180deg,transparent,var(--ip-accent),transparent);animation:acp-flow 1.4s linear infinite}

.acp-body{padding-bottom:22px;min-width:0}

.acp-item{font-size:15.5px;font-weight:500;margin-top:2px;line-height:1.35}

.acp-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.acp-val{padding:9px 15px;border-radius:11px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--ip-accent);background:rgba(116,176,216,.10);color:var(--ip-text);transition:.18s;font-family:inherit}
.acp-val:active{transform:scale(.97)}

.acp-obsbtn{padding:9px 13px;border-radius:11px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--glass-brd);background:transparent;color:var(--ip-muted);font-family:inherit}
.acp-obs{width:100%;margin-top:9px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:13px;font-family:inherit;min-height:62px;resize:vertical}

function stInfo(v){ return ACOMP_ST.filter(function(s){return s.v===v;})[0]||ACOMP_ST[0]; }
function nextSt(v){ var i=ACOMP_ST.map(function(s){return s.v;}).indexOf(v); return ACOMP_ST[(i+1)%ACOMP_ST.length].v; }
function pctExec(items){ if(!items.length) return 0; var s=items.reduce(function(a,it){ return a+(it.status==="validado"?1:it.status==="concluido"?1:it.status==="andamento"?.5:0); },0); return Math.round(s/items.length*100); }

function Execucao(p){

    sb.from("acomp_itens").update(campo).eq("id",id).then(function(r){ if(r.error){ p.flash("Erro ao salvar: "+r.error.message,"err"); p.reload(); } });
  }
  function ciclar(it){ patch(it.id,{status:nextSt(it.status)}); }
  function setObs(id,v){ setItems(function(list){ return list.map(function(x){ return x.id===id?Object.assign({},x,{observacao:v}):x; }); }); }
  function salvarObs(it){ sb.from("acomp_itens").update({observacao:it.observacao}).eq("id",it.id).then(function(r){ if(r.error) p.flash("Erro: "+r.error.message,"err"); }); }

    var ordem=(items.reduce(function(m,x){return Math.max(m,x.ordem||0);},0))+1;
    sb.from("acomp_itens").insert({cliente_id:p.clienteId,grupo:nova.grupo||"Geral",item:nova.item,descricao:nova.descricao,categoria:"entrega",status:"pendente",ordem:ordem}).select().then(function(r){
      if(r.error){ p.flash("Erro: "+r.error.message,"err"); return; }

      setNova({grupo:nova.grupo,item:"",descricao:""}); setAdding(false); p.flash("Item adicionado ✓");
    });
  }

  var pct=pctExec(items);
  var nVal=items.filter(function(i){return i.status==="validado";}).length;
  var nCon=items.filter(function(i){return i.status==="concluido"||i.status==="validado";}).length;
  var link=(typeof location!=="undefined"?location.origin:"https://iso.inpersonaltec.com.br")+"/?acompanhar="+(p.shareC?p.shareC.token:"");
  function copiarLink(){ try{ navigator.clipboard.writeText(link); p.flash("Link copiado ✓"); }catch(e){ p.flash(link,"ok"); } }

  return h("div",null,
    h(TopBar,{title:"Execução do serviço",sub:"Acompanhamento do escopo contratado · "+p.clienteNome,clientes:p.clientesISO,clienteId:p.clienteId,clienteNome:p.clienteNome,onClient:p.setClienteId,

    h("div",{className:"ip-card ip-pad",style:{marginBottom:"16px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px",flexWrap:"wrap"}},
