<style>
/* ============================================================
   INPERSON · Qualidade ISO — app independente
   Tema AURA: fundo #010510, acento #74B0D8, texto #FAFAFA.
   ============================================================ */
:root{
  --ip-bg:#010510; --ip-surface:#080F1E; --ip-surface-2:#0C1426;
  --ip-border:#15223A; --ip-border-2:#21344E;
  --ip-accent:#74B0D8; --ip-accent-2:#5B9BC4; --ip-accent-dim:rgba(116,176,216,.12);
  --ip-text:#FAFAFA; --ip-muted:#8FA3BE; --ip-faint:#52647F;
  --ip-ok:#5FBF8F; --ip-warn:#D9A441; --ip-danger:#D9655B;
  --ip-radius:16px; --ip-radius-sm:10px;
  --ip-font:"Segoe UI", Inter, system-ui, -apple-system, sans-serif;
  --glass-bg:linear-gradient(135deg, rgba(124,176,216,.10), rgba(255,255,255,.02));
  --glass-brd:rgba(150,190,225,.16);
  --glass-blur:blur(20px) saturate(150%);
  --glass-shadow:0 10px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
*{box-sizing:border-box}
html,body,#root{height:100%}
body{margin:0;font-family:var(--ip-font);font-weight:400;color:var(--ip-text);background:var(--ip-bg);-webkit-font-smoothing:antialiased;letter-spacing:.2px;overflow-x:hidden}
a{color:var(--ip-accent);text-decoration:none}
button{font-family:inherit}
h1,h2,h3{font-weight:300;margin:0}
/* fundo vivo */
.ip-bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.ip-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.ip-blob.b1{width:46vw;height:46vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#1f5e8a,transparent 70%);animation:ip-aurora 22s ease-in-out infinite}
.ip-blob.b2{width:40vw;height:40vw;right:-6vw;top:8vh;background:radial-gradient(circle,#0e3a5c,transparent 70%);animation:ip-aurora 28s ease-in-out infinite reverse}
.ip-blob.b3{width:50vw;height:50vw;left:18vw;bottom:-22vw;background:radial-gradient(circle,#14506e,transparent 70%);animation:ip-aurora 34s ease-in-out infinite}
@keyframes ip-aurora{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-4%) scale(1.12)}66%{transform:translate(-4%,5%) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes ip-spin{to{transform:rotate(360deg)}}
@keyframes ip-fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* layout */
.ip-rel{position:relative;z-index:1}
.ip-muted{color:var(--ip-muted)} .ip-faint{color:var(--ip-faint)} .ip-accent{color:var(--ip-accent)}
.ip-shell{display:flex;min-height:100vh;position:relative;z-index:1}
.ip-side{width:248px;flex:0 0 248px;padding:22px 16px;border-right:1px solid var(--ip-border);display:flex;flex-direction:column;gap:6px;background:rgba(5,10,22,.55);backdrop-filter:blur(14px);position:sticky;top:0;height:100vh}
.ip-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.ip-brand img{width:40px;height:40px;border-radius:10px}
.ip-brand b{font-weight:600;letter-spacing:.5px;font-size:15px}
.ip-nav{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:var(--ip-muted);cursor:pointer;transition:.15s;font-size:14px;border:1px solid transparent}
.ip-nav:hover{background:rgba(116,176,216,.08);color:var(--ip-text)}
.ip-nav.on{background:var(--glass-bg);border-color:var(--glass-brd);color:var(--ip-text);box-shadow:var(--glass-shadow)}
.ip-nav .ic{font-size:17px;width:22px;text-align:center}
.ip-main{flex:1;min-width:0;padding:28px 30px 60px;animation:ip-fadeup .4s ease}
.ip-topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.ip-h1{font-size:26px;font-weight:300}
.ip-sub{color:var(--ip-muted);font-size:13px;margin-top:3px}
/* glass card */
.ip-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-brd);border-radius:var(--ip-radius);box-shadow:var(--glass-shadow)}
.ip-pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.grid.k4{grid-template-columns:repeat(4,1fr)} .grid.k3{grid-template-columns:repeat(3,1fr)} .grid.k2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1000px){.grid.k4{grid-template-columns:repeat(2,1fr)}.grid.k3{grid-template-columns:1fr}.grid.k2{grid-template-columns:1fr}}
/* pills / badges */
.ip-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.4px;border:1px solid var(--glass-brd);color:var(--ip-muted);background:rgba(255,255,255,.03)}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.3px}
.bdg.ok{color:#0a2c1d;background:var(--ip-ok)} .bdg.warn{color:#2c2206;background:var(--ip-warn)} .bdg.dang{color:#2c0c09;background:var(--ip-danger)}
.bdg.dim{color:var(--ip-muted);background:rgba(255,255,255,.05);border:1px solid var(--glass-brd)}
/* buttons / inputs */
.ip-btn{position:relative;display:inline-flex;align-items:center;gap:8px;justify-content:center;padding:10px 16px;border-radius:var(--ip-radius-sm);border:1px solid var(--ip-accent);background:linear-gradient(135deg,var(--ip-accent),var(--ip-accent-2));color:#03101c;font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s}
.ip-btn:hover{filter:brightness(1.07);box-shadow:0 6px 16px rgba(116,176,216,.26)}
.ip-btn:active{filter:brightness(.95)}
.ip-btn:disabled{opacity:.5;cursor:not-allowed}
.ip-btn.ghost{background:rgba(255,255,255,.04);border-color:var(--glass-brd);color:var(--ip-text)}
.ip-btn.ghost:hover{background:rgba(116,176,216,.12);border-color:var(--ip-accent)}
.ip-btn.sm{padding:6px 11px;font-size:12px}
.ip-input,.ip-sel,textarea.ip-input{width:100%;padding:11px 13px;border-radius:var(--ip-radius-sm);background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);color:var(--ip-text);font-size:14px;transition:.18s}
.ip-input:focus,.ip-sel:focus,textarea.ip-input:focus{outline:none;border-color:var(--ip-accent)}
.ip-input::placeholder{color:var(--ip-faint)}

.ip-lbl{display:block;font-size:12px;color:var(--ip-muted);margin:0 0 6px;letter-spacing:.3px}
.field{margin-bottom:14px}

.ip-tbl{width:100%;border-collapse:collapse;font-size:13px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sec-h{font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--ip-faint);margin:22px 0 10px}
/* auth */
.ip-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.ip-authbox{width:100%;max-width:380px;text-align:center}
.ip-authbox img{width:64px;height:64px;border-radius:16px;margin-bottom:14px}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:ip-spin .8s linear infinite}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;padding:12px 20px;border-radius:12px;background:var(--ip-surface-2);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow);font-size:14px;animation:ip-fadeup .3s ease}

.acp-live .d{width:7px;height:7px;border-radius:50%;background:var(--ip-ok);box-shadow:0 0 8px var(--ip-ok);animation:ip-blink 1.4s ease-in-out infinite}

.acp-bar i .sh{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);transform:translateX(-100%);animation:acp-shimmer 1.9s ease-in-out infinite}
@keyframes acp-shimmer{100%{transform:translateX(220%)}}
.acp-tl{position:relative}
